AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Glean - Lambda + API Gateway Backend

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures: [arm64]
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        SSM_FIREBASE_SERVICE_ACCOUNT: /glean/firebase-service-account
        SSM_GEMINI_API_KEY: /glean/gemini-api-key
    Layers:
      - !Ref SharedDepsLayer

Parameters:
  AllowedOrigin:
    Type: String
    Description: Origin header value for CORS
    Default: "https://myglean.jp"

  DomainName:
    Type: String
    Description: Custom domain name for CloudFront
    Default: "myglean.jp"

  AcmCertificateArn:
    Type: String
    Description: ACM certificate ARN (must be in us-east-1)
    Default: ""

Conditions:
  HasCertificate: !Not [!Equals [!Ref AcmCertificateArn, ""]]

Resources:
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub glean-frontend-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: glean-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    DependsOn: CloudFrontDistribution
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyText:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: glean
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
          - Id: ApiGatewayOrigin
            DomainName: !Sub ${GleanApi}.execute-api.${AWS::Region}.amazonaws.com
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          MinTTL: 0
          DefaultTTL: 86400
          MaxTTL: 31536000
          Compress: true
        CacheBehaviors:
          - PathPattern: /index.html
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            ForwardedValues:
              QueryString: false
              Cookies:
                Forward: none
            MinTTL: 0
            DefaultTTL: 60
            MaxTTL: 300
            Compress: true
          - PathPattern: /api/*
            TargetOriginId: ApiGatewayOrigin
            ViewerProtocolPolicy: https-only
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
            ForwardedValues:
              QueryString: true
              Headers:
                - Authorization
                - Content-Type
              Cookies:
                Forward: all
            MinTTL: 0
            DefaultTTL: 0
            MaxTTL: 0
            Compress: true
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificateArn
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only
        AlternateDomainNames:
          - !Ref DomainName
          - !Sub www.${DomainName}

  SharedDepsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: glean-shared-deps
      ContentUri: lambdas/shared/
      CompatibleRuntimes: [nodejs22.x]
      CompatibleArchitectures: [arm64]
    Metadata:
      BuildMethod: nodejs22.x
      BuildArchitecture: arm64

  OgpFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: glean-ogp
      CodeUri: lambdas/ogp/
      Handler: dist/handler.handler
      Description: OGP data fetcher with Firebase auth
      Environment:
        Variables:
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Events:
        OgpApi:
          Type: Api
          Properties:
            RestApiId: !Ref GleanApi
            Path: /api/ogp
            Method: GET
    Metadata:
      BuildMethod: nodejs22.x
      BuildArchitecture: arm64

  GeminiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: glean-gemini
      CodeUri: lambdas/gemini/
      Handler: dist/handler.handler
      Description: Gemini summary generator with Firebase auth
      Environment:
        Variables:
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Events:
        GeminiApi:
          Type: Api
          Properties:
            RestApiId: !Ref GleanApi
            Path: /api/gemini
            Method: POST
    Metadata:
      BuildMethod: nodejs22.x
      BuildArchitecture: arm64

  GleanApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: glean-api
      StageName: prod
      EndpointConfiguration: REGIONAL
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: !Sub "'${AllowedOrigin}'"

Outputs:
  ApiEndpoint:
    Value: !Sub https://${GleanApi}.execute-api.${AWS::Region}.amazonaws.com/prod
    Description: API Gateway endpoint
    Export:
      Name: !Sub ${AWS::StackName}-ApiEndpoint

  GleanApiId:
    Value: !Ref GleanApi
    Description: API Gateway ID
    Export:
      Name: !Sub ${AWS::StackName}-GleanApiId

  FrontendBucketName:
    Value: !Ref FrontendBucket
    Description: Frontend S3 Bucket Name
    Export:
      Name: !Sub ${AWS::StackName}-FrontendBucketName

  CloudFrontDistributionId:
    Value: !Ref CloudFrontDistribution
    Description: CloudFront Distribution ID
    Export:
      Name: !Sub ${AWS::StackName}-CloudFrontDistributionId

  CloudFrontDomainName:
    Value: !GetAtt CloudFrontDistribution.DomainName
    Description: CloudFront Distribution Domain Name
    Export:
      Name: !Sub ${AWS::StackName}-CloudFrontDomainName
